name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Zoomiez-test-Documentation/package-lock.json

      - name: Install test deps
        working-directory: Zoomiez-test-Documentation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Zoomiez-test-Documentation
        run: npx playwright install --with-deps chromium

      - name: Install frontend deps
        working-directory: Frontend
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/zoomiez_test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key' }}
          APP_ENV: local
          OPENAI_API_KEY: ""
          RESEND_API_KEY: ""
          MISTRAL_API_KEY: ""
        run: python run.py &

      - name: Start frontend
        working-directory: Frontend
        env:
          VITE_API_URL: http://localhost:5000
        run: npm run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:5000/health http://localhost:8080 --timeout 60000

      - name: Create users fixture
        working-directory: Zoomiez-test-Documentation
        run: cp fixtures/users.example.json fixtures/users.json

      - name: Run Playwright tests
        working-directory: Zoomiez-test-Documentation
        env:
          PW_BASE_URL: http://localhost:8080
          API_BASE_URL: http://localhost:5000
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key' }}
          STUB_MODE: "true"
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Zoomiez-test-Documentation/playwright-report/
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-playwright
          path: Zoomiez-test-Documentation/allure-results/
          retention-days: 7
