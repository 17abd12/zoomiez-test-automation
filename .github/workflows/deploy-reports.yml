name: deploy-reports

# Publishes the committed reports + screenshots (docs/) to GitHub Pages so the
# Playwright/Allure/Newman/k6 HTML reports are viewable online — portfolio link.
# Enable once: repo Settings → Pages → Source = GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4   # Allure CLI needs a JRE
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      # Build the Allure HTML report from committed allure-results into docs/reports/allure
      - run: npx allure generate allure-results --clean -o docs/reports/allure

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs      # docs/index.html (hub) + docs/reports/allure/ (generated)

      - id: deployment
        uses: actions/deploy-pages@v4
