name: deploy-reports

# Publishes docs/ to GitHub Pages — the hub + all committed reports.
# Playwright/Cypress/Newman/pytest reports are committed after local runs.
# Allure is generated here from committed allure-results/ (needs JRE).
# Enable once: repo Settings → Pages → Source = GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      # Generate Allure HTML from committed allure-results/ into docs/allure/
      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o docs/allure
        continue-on-error: true   # skip gracefully if allure-results/ is empty

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs   # hub + playwright/ + cypress/ + newman/ + pytest/ + allure/

      - id: deployment
        uses: actions/deploy-pages@v4
