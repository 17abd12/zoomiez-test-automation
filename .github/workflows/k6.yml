name: k6 Load Tests

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration (e.g. 30s, 1m)"
        default: "30s"
      vus:
        description: "Virtual users"
        default: "10"
  schedule:
    # Run load tests nightly at 2am UTC
    - cron: "0 2 * * *"

jobs:
  k6-load:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Install + start backend
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/zoomiez_test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key' }}
          APP_ENV: local
          OPENAI_API_KEY: ""
          RESEND_API_KEY: ""
          MISTRAL_API_KEY: ""
        run: |
          pip install -r requirements.txt
          python run.py &
          sleep 5

      - name: k6 — Login load test
        working-directory: Zoomiez-test-Documentation
        env:
          K6_VUS: ${{ inputs.vus || '10' }}
          K6_DURATION: ${{ inputs.duration || '30s' }}
          API_BASE_URL: http://localhost:5000
        run: k6 run k6/scenarios/login-load.js

      - name: k6 — Papers load test
        working-directory: Zoomiez-test-Documentation
        env:
          K6_VUS: ${{ inputs.vus || '10' }}
          K6_DURATION: ${{ inputs.duration || '30s' }}
          API_BASE_URL: http://localhost:5000
          LOAD_TEST_TOKEN: ${{ secrets.LOAD_TEST_JWT || '' }}
        run: k6 run k6/scenarios/papers-load.js

      - name: k6 — Dashboard load test
        working-directory: Zoomiez-test-Documentation
        env:
          K6_VUS: ${{ inputs.vus || '10' }}
          K6_DURATION: ${{ inputs.duration || '30s' }}
          API_BASE_URL: http://localhost:5000
          LOAD_TEST_TOKEN: ${{ secrets.LOAD_TEST_JWT || '' }}
        run: k6 run k6/scenarios/dashboard-load.js
