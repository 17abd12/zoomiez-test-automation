name: Backend Tests (pytest) + Newman Contract Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend pytest (40+ tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install test deps
        working-directory: Zoomiez-test-Documentation/backend-tests
        run: pip install -r requirements-test.txt

      - name: Run pytest
        working-directory: Zoomiez-test-Documentation/backend-tests
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/zoomiez_test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key' }}
          APP_ENV: local
          OPENAI_API_KEY: ""
          RESEND_API_KEY: ""
          MISTRAL_API_KEY: ""
          R2_ACCOUNT_ID: "test"
          R2_ACCESS_KEY_ID: "test"
          R2_SECRET_ACCESS_KEY: "test"
          R2_BUCKET_NAME: "test-bucket"
        run: |
          pytest . -v \
            --alluredir=../allure-results \
            --tb=short \
            -x

      - name: Upload Allure results (backend)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-backend
          path: Zoomiez-test-Documentation/allure-results/
          retention-days: 7

  newman-contract:
    name: Newman API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-tests

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-allure

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/zoomiez_test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key' }}
          APP_ENV: local
          OPENAI_API_KEY: ""
          RESEND_API_KEY: ""
          MISTRAL_API_KEY: ""
        run: python run.py &

      - name: Wait for backend
        run: npx wait-on http://localhost:5000/health --timeout 30000

      - name: Run Newman contract tests
        working-directory: Zoomiez-test-Documentation
        run: |
          newman run newman/zoomiez-collection.json \
            -e newman/environments/local.json \
            --reporters cli,allure \
            --reporter-allure-export allure-results \
            --bail

      - name: Upload Allure results (newman)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-newman
          path: Zoomiez-test-Documentation/allure-results/
          retention-days: 7
